## NeuroWatch nginx site
## Path placeholders are substituted by deploy/lightsail/deploy.sh at install time.

upstream neurowatch_app {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    ## Hard cap on request body (audio uploads etc).
    client_max_body_size 25m;
    client_body_timeout 60s;
    client_header_timeout 30s;

    ## Hide nginx version in headers
    server_tokens off;

    ## Static SPA root produced by `vite build`.
    root __APP_DIR__/frontend/dist;
    index index.html;

    ## Compression for text-like assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    ## Security headers (applied to every response).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), interest-cohort=()" always;
    add_header X-XSS-Protection "0" always;

    ## --- Hashed Vite build assets: cache forever (filenames are content-hashed).
    location ^~ /assets/ {
        access_log off;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    ## --- Common proxy header set, shared across dynamic locations.
    ##     (NeuroWatch has no WebSockets, so no Upgrade/Connection juggling.)

    ## --- API: proxy everything under /api/ to FastAPI.
    location /api/ {
        proxy_pass http://neurowatch_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    ## --- FastAPI auto-generated API docs (handy in production for debugging).
    location = /openapi.json {
        proxy_pass http://neurowatch_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs {
        proxy_pass http://neurowatch_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /redoc {
        proxy_pass http://neurowatch_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ## --- Single-page-app fallback: any non-asset, non-api path -> index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    ## --- Block hidden dotfiles (.env, .git, etc) from ever being served by nginx.
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
