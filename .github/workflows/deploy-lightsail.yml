name: Deploy NeuroWatch To AWS Lightsail

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".gitignore"

concurrency:
  group: lightsail-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
      LIGHTSAIL_SSH_PORT: ${{ secrets.LIGHTSAIL_SSH_PORT }}
      LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
      LIGHTSAIL_REPO_URL: ${{ secrets.LIGHTSAIL_REPO_URL }}
      LIGHTSAIL_BRANCH: ${{ secrets.LIGHTSAIL_BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests/integration/test_auth_api.py backend/tests/integration/test_sessions_api.py

      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm --prefix frontend run build

      - name: Prepare defaults
        run: |
          if [ -z "$LIGHTSAIL_SSH_PORT" ]; then echo "LIGHTSAIL_SSH_PORT=22" >> $GITHUB_ENV; fi
          if [ -z "$LIGHTSAIL_APP_DIR" ]; then echo "LIGHTSAIL_APP_DIR=/opt/neurowatch" >> $GITHUB_ENV; fi
          if [ -z "$LIGHTSAIL_BRANCH" ]; then echo "LIGHTSAIL_BRANCH=main" >> $GITHUB_ENV; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.LIGHTSAIL_HOST }}
          username: ${{ env.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ env.LIGHTSAIL_SSH_PORT }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_DIR="${LIGHTSAIL_APP_DIR}"
            BRANCH="${LIGHTSAIL_BRANCH}"
            REPO_URL="${LIGHTSAIL_REPO_URL}"

            if [ -z "$REPO_URL" ]; then
              echo "LIGHTSAIL_REPO_URL secret is required."
              exit 1
            fi

            sudo mkdir -p "$APP_DIR"
            sudo chown "$USER:$USER" "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            bash deploy/lightsail/deploy.sh "$APP_DIR"
